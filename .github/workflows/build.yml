name: Build TWA APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK
        run: |
          npm install -g @bubblewrap/cli
          bubblewrap init --manifest https://sly-pay-gate-pro.base44.app/manifest.json
          bubblewrap build
      - uses: actions/upload-artifact@v4
        with:
          name: feeaccess-apk
          path: app/build/outputs/apk/release/
