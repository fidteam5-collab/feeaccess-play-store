name: Build TWA APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli@latest
      - name: Initialize TWA project
        run: |
          mkdir twa-project && cd twa-project
          bubblewrap init --manifest https://sly-pay-gate-pro.base44.app/manifest.json --directory .
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: 'true'
      - name: Build APK
        run: |
          cd twa-project
          bubblewrap build --skipSigning
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: feeaccess-apk
          path: twa-project/app-release-unsigned.apk
