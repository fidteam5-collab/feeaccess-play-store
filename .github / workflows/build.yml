name: Build TWA APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli@latest
      - name: Build APK
        run: |
          mkdir twa && cd twa
          echo '{"answer":"n"}' | bubblewrap init --manifest https://sly-pay-gate-pro.base44.app/manifest.json
          bubblewrap build --skipSigning
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: feeaccess-apk
          path: twa/app-release-unsigned.apk
